#
#  □  scenarios/<id>/repo/pyproject.toml   has [tool.pytest.ini_options]
#  □  scenarios/<id>/repo/tests/           all pass on the STARTING code
#  □  scenarios/<id>/prompt.txt            ends with these 4 ## headers
#                                          (these names are generic — they
#                                          work for any scenario type;
#                                          the parser also accepts the
#                                          legacy ## VULNERABILITIES FOUND
#                                          / ## FIXES APPLIED variants, as
#                                          well as ## ISSUES FOUND):
#         ## TASK SUMMARY
#         ## CODE CHANGES
#         ## TESTS ADDED
#         ## TEST RESULTS
#  □  scenarios/<id>/verify.sh             exits 0 only when the task is
#                                          correctly done (pytest + any
#                                          task-specific check)
#  □  This ground-truth.yaml                title, description, objective.type
#                                          filled; semgrep_config and
#                                          forbidden_patterns included only
#                                          when applicable.
#
#  Validate:
#     cd scenarios/<id>/repo && python -m pytest -q     # must pass
#     cd scenarios/<id> && bash verify.sh               # must FAIL before
#                                                       # the task is done,
#                                                       # PASS after.
